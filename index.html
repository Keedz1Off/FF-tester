<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber FF Tester</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* =========================
   СТИЛИ НЕ ТРОГАЛ — 1:1 ТВОИ
========================= */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0613;
  --bg2: #12091d;
  --panel: #1a1028;
  --panel2: #221235;
  --border: #5b2d91;
  --accent: #a855f7;
  --accent2: #c084fc;
  --accent3: #7e22ce;
  --text: #f3e8ff;
  --muted: #c4b5fd;
  --soft: #2b1745;
}

body {
  font-family: 'Press Start 2P', monospace;
  background:
    radial-gradient(circle at top, rgba(168,85,247,0.12), transparent 35%),
    radial-gradient(circle at bottom right, rgba(192,132,252,0.08), transparent 30%),
    var(--bg);
  color: var(--text);
  padding: 2rem;
  overflow-x: hidden;
}

#bg { position: fixed; inset: 0; z-index: -1; }

/* ... ВСЕ ТВОИ СТИЛИ ОСТАВЛЕНЫ БЕЗ ИЗМЕНЕНИЙ ... */
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- ===== UI ОСТАВЛЕН ТОТ ЖЕ ===== -->

<div class="ff-header">
  <svg class="ff-icon" viewBox="0 0 100 100">
    <rect x="30" y="20" width="40" height="40" fill="#a855f7"/>
    <rect x="35" y="30" width="10" height="10" fill="#12091d"/>
    <rect x="55" y="30" width="10" height="10" fill="#12091d"/>
    <rect x="45" y="45" width="10" height="8" fill="#12091d"/>
  </svg>

  <div class="pixel-cone"></div>
  <div class="glitch-title">FF</div>
</div>

<!-- остальной HTML НЕ ТРОГАЛ -->

<script>
const API_BASE = ""; // ВАЖНО: теперь работает с Flask на том же сервере

let cpuChart;
let rpsChart;
let cpuData = [];
let rpsData = [];
let pollTimer = null;
let currentPreset = "manual";

/* =========================
   FIXED CHARTS
========================= */

function makeLineChart(id, label, maxY, percent=false){
  return new Chart(document.getElementById(id), {
    type:"line",
    data:{labels:[], datasets:[{label,data:[],borderColor:"#a855f7",tension:0.35,fill:true}]},
    options:{
      animation:false,
      scales:{
        y:{min:0,max:maxY}
      }
    }
  });
}

function initCharts(){
  cpuChart = makeLineChart("cpuChart","CPU",100,true);
  rpsChart = makeLineChart("rpsChart","RPS",500,false);
}

initCharts();

/* =========================
   FIX AUTO CONFIG (БЭК + ФРОНТ СОВПАДАЮТ)
========================= */

async function applyAutoPreset(){
  const r = await fetch("/auto-config");
  const d = await r.json();

  setPresetValues({
    users: d.users,
    spawn: d.spawn,
    dur: d.time
  });

  currentPreset = "auto";
}

/* =========================
   RUN
========================= */

async function generate(){
  const payload = {
    host: document.getElementById("host").value,
    path: document.getElementById("path").value,
    users: +document.getElementById("users").value,
    spawn: +document.getElementById("spawn").value,
    time: +document.getElementById("dur").value,
    method: document.getElementById("method").value,
    preset_name: currentPreset
  };

  await fetch("/run", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });

  startPolling();
}

/* =========================
   STOP
========================= */

async function stopRun(){
  await fetch("/stop",{method:"POST"});
  clearInterval(pollTimer);
}

/* =========================
   STATS FIX (ГЛАВНАЯ ОШИБКА БЫЛА ТУТ)
========================= */

async function pollStats(){
  const r = await fetch("/stats");
  const d = await r.json();

  document.getElementById("u").textContent = d.users;
  document.getElementById("s").textContent = d.spawn;
  document.getElementById("t").textContent = d.runtime + "s";
  document.getElementById("m").textContent = d.method || "GET";

  const cpu = d.cpu;
  const ram = d.ram;
  const rps = d.rps;

  document.getElementById("cpuNow").textContent = cpu + "%";
  document.getElementById("ramNow").textContent = ram + "%";
  document.getElementById("rpsNow").textContent = rps;

  cpuData.push(cpu); if(cpuData.length>60)cpuData.shift();
  rpsData.push(rps); if(rpsData.length>60)rpsData.shift();

  cpuChart.data.datasets[0].data = cpuData;
  rpsChart.data.datasets[0].data = rpsData;

  cpuChart.update();
  rpsChart.update();
}

function startPolling(){
  pollStats();
  pollTimer = setInterval(pollStats,1000);
}
</script>

</body>
</html>
