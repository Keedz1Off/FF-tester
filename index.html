<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Tester FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: monospace;
  background: #0b0613;
  color: white;
  padding: 20px;
}

.card {
  border: 1px solid #333;
  padding: 10px;
  margin: 10px 0;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.metric {
  border: 1px solid #333;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<h2>FF TESTER FIX</h2>

<div class="card">
  <input id="host" placeholder="http://127.0.0.1:8000">
  
  <select id="path">
    <option value="/">/</option>
    <option value="/health">/health</option>
    <option value="/test">/test</option>
  </select>

  <input id="users" type="number" value="50">
  <input id="spawn" type="number" value="5">
  <input id="dur" type="number" value="30">

  <button onclick="runTest()">RUN</button>
  <button onclick="stopTest()">STOP</button>
</div>

<div class="metrics">
  <div class="metric">CPU <div id="cpu">0</div></div>
  <div class="metric">RAM <div id="ram">0</div></div>
  <div class="metric">RPS <div id="rps">0</div></div>
  <div class="metric">USERS <div id="usersNow">0</div></div>
</div>

<canvas id="cpuChart"></canvas>
<canvas id="rpsChart"></canvas>

<pre id="log">ready</pre>

<script>
const API = "http://127.0.0.1:5000";

let cpuChart, rpsChart;
let timer = null;

function log(t){ document.getElementById("log").textContent = t; }

function initCharts(){
  cpuChart = new Chart(document.getElementById("cpuChart"), {
    type:"line",
    data:{labels:[],datasets:[{data:[]}]}
  });

  rpsChart = new Chart(document.getElementById("rpsChart"), {
    type:"line",
    data:{labels:[],datasets:[{data:[]}]}
  });
}

initCharts();

function push(chart,val){
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(val);

  if(chart.data.labels.length>60){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

async function runTest(){
  const body = {
    host: document.getElementById("host").value,
    path: document.getElementById("path").value,
    users: Number(document.getElementById("users").value),
    spawn: Number(document.getElementById("spawn").value),
    time: Number(document.getElementById("dur").value),
    preset_name: "manual"
  };

  const res = await fetch(API + "/run", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  log(JSON.stringify(data,null,2));

  start();
}

async function stopTest(){
  await fetch(API + "/stop", {method:"POST"});
  clearInterval(timer);
  log("stopped");
}

function start(){
  timer = setInterval(update, 1000);
}

async function update(){
  const res = await fetch(API + "/stats");
  const d = await res.json();

  // ✅ ВАЖНО: СОВПАДАЕТ С FLASK
  document.getElementById("cpu").textContent = d.cpu ?? 0;
  document.getElementById("ram").textContent = d.ram ?? 0;
  document.getElementById("rps").textContent = d.rps ?? 0;
  document.getElementById("usersNow").textContent = d.users ?? 0;

  push(cpuChart, d.cpu ?? 0);
  push(rpsChart, d.rps ?? 0);
}
</script>

</body>
</html>
